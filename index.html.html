<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feliz Dia dos Namorados 💕</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: #1a0a0f;
    }

    .carta-bg {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a0a0f 0%, #2d0f1e 50%, #1a0a0f 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 2.5rem 1rem 3rem;
      position: relative;
      overflow: hidden;
    }

    /* ---- PARTÍCULAS ---- */
    .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

    .heart-particle {
      position: absolute;
      opacity: 0;
      animation: floatUp linear infinite;
      color: #e8647a;
      user-select: none;
    }

    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(0deg) scale(0.5); opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.2; }
      100% { transform: translateY(-110vh) rotate(25deg) scale(1.1); opacity: 0; }
    }

    /* ---- WRAPPER ---- */
    .envelope-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.3rem;
      width: 100%;
      max-width: 520px;
      position: relative;
      z-index: 2;
    }

    /* ---- TELA INÍCIO ---- */
    #tela-inicio {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      min-height: 80vh;
      text-align: center;
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .envelope-icon {
      font-size: 80px;
      animation: pulse 2.2s ease-in-out infinite;
      filter: drop-shadow(0 0 18px rgba(232,100,122,0.65));
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.09); }
    }

    .inicio-titulo {
      font-family: 'Dancing Script', cursive;
      font-size: 30px;
      color: #f4a0b0;
      text-shadow: 0 0 22px rgba(244,160,176,0.5);
      line-height: 1.45;
    }

    .inicio-sub {
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: 13px;
      color: rgba(244,160,176,0.5);
      letter-spacing: 0.5px;
    }

    .btn-abrir {
      font-family: 'Dancing Script', cursive;
      font-size: 19px;
      background: linear-gradient(135deg, #c0506a, #e8647a);
      border: none;
      color: #fff;
      padding: 13px 40px;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 4px 22px rgba(200,80,100,0.45);
      transition: transform 0.15s, box-shadow 0.15s;
      letter-spacing: 0.4px;
    }

    .btn-abrir:hover  { transform: scale(1.05); box-shadow: 0 6px 30px rgba(200,80,100,0.6); }
    .btn-abrir:active { transform: scale(0.98); }

    /* ---- TELA CARTA ---- */
    #tela-carta {
      display: none;
      width: 100%;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
    }

    .title-script {
      font-family: 'Dancing Script', cursive;
      font-size: 29px;
      color: #f4a0b0;
      text-align: center;
      opacity: 0;
      transform: translateY(-10px);
      transition: opacity 0.9s ease, transform 0.9s ease;
      text-shadow: 0 0 22px rgba(244,160,176,0.4);
    }

    .title-script.visible { opacity: 1; transform: translateY(0); }

    /* barra de música */
    .music-bar {
      display: none;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(244,160,176,0.22);
      border-radius: 30px;
      padding: 7px 20px;
      color: rgba(244,160,176,0.7);
      font-family: 'Lora', serif;
      font-size: 12px;
      font-style: italic;
      cursor: pointer;
      transition: background 0.2s;
      user-select: none;
    }

    .music-bar:hover { background: rgba(244,160,176,0.08); }
    .music-bar.visible { display: flex; }

    .music-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #e8647a;
      flex-shrink: 0;
    }

    .music-dot.playing { animation: pulse-dot 1.1s ease-in-out infinite; }

    @keyframes pulse-dot {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.35; transform: scale(0.65); }
    }

    /* papel da carta */
    .carta-paper {
      background: #fdf8f0;
      border-radius: 3px;
      padding: 2rem 2.2rem;
      width: 100%;
      position: relative;
      box-shadow: 0 8px 44px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(0,0,0,0.04);
    }

    .carta-paper::before {
      content: '';
      position: absolute;
      left: 2.2rem;
      top: 2rem;
      bottom: 2rem;
      width: 1px;
      background: rgba(220,180,180,0.28);
    }

    .carta-text {
      font-family: 'Lora', serif;
      font-size: 14.5px;
      line-height: 27px;
      color: #2c1a1a;
      position: relative;
      z-index: 1;
      min-height: 100px;
      white-space: pre-wrap;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 15px;
      background: #c0506a;
      margin-left: 1px;
      vertical-align: middle;
      animation: blink 0.7s step-end infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }
    .cursor.hidden { display: none; }

    .assinatura {
      font-family: 'Dancing Script', cursive;
      font-size: 22px;
      color: #b03050;
      text-align: right;
      margin-top: 1rem;
      opacity: 0;
      transition: opacity 1.2s ease;
    }

    .assinatura.visible { opacity: 1; }

    /* botões finais */
    .bottom-row {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.7s ease;
    }

    .bottom-row.visible { opacity: 1; }

    .btn-action {
      font-family: 'Dancing Script', cursive;
      font-size: 15px;
      background: transparent;
      border: 1px solid rgba(244,160,176,0.38);
      color: #f4a0b0;
      padding: 7px 22px;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-action:hover { background: rgba(244,160,176,0.1); }

    /* rodapé */
    .rodape {
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: 11px;
      color: rgba(244,160,176,0.28);
      text-align: center;
      margin-top: 0.5rem;
    }

    /* responsivo */
    @media (max-width: 400px) {
      .carta-paper { padding: 1.5rem 1.4rem; }
      .carta-text  { font-size: 13.5px; }
      .title-script { font-size: 24px; }
    }
  </style>
</head>
<body>

<div class="carta-bg" id="bg">
  <div class="particles" id="particles"></div>

  <div class="envelope-wrapper">

    <!-- ===== TELA INÍCIO ===== -->
    <div id="tela-inicio">
      <div class="envelope-icon">💌</div>
      <div class="inicio-titulo">Tenho algo para<br>te dizer...</div>
      <div class="inicio-sub">toque para abrir</div>
      <button class="btn-abrir" onclick="abrirCarta()">Abrir carta ♥</button>
    </div>

    <!-- ===== TELA CARTA ===== -->
    <div id="tela-carta">

      <div class="title-script" id="title">Feliz Dia dos Namorados 💕</div>

      <!-- Barra de música — clique para tocar/pausar -->
      <div class="music-bar" id="music-bar" onclick="toggleMusic()">
        <div class="music-dot" id="music-dot"></div>
        <span id="music-label">♪ Those Eyes · New West — toque para ouvir</span>
      </div>

      <div class="carta-paper">
        <div class="carta-text" id="carta-text"><span class="cursor" id="cursor"></span></div>
        <div class="assinatura" id="assinatura">Te popoto muito! ❤</div>
      </div>

      <div class="bottom-row" id="bottom-row">
        <button class="btn-action" onclick="restart()">↺ ler novamente</button>
        <button class="btn-action" onclick="toggleMusic()">♪ música</button>
      </div>

      <div class="rodape">feito com muito amor ♥</div>

    </div>
  </div>
</div>

<!--
  ================================================
  MÚSICA: coloque o arquivo MP3 na mesma pasta
  e troque "those-eyes.mp3" pelo nome do arquivo.
  ================================================
-->
<audio id="audio" loop>
  <source src="Until I Found You.mp3" type="audio/mpeg" />
</audio>

<script>
  /* ---- TEXTO DA CARTA ---- */
  const texto =
`Oi meu amor,

Hoje, nesse dia tão especial, gostaria de eternizá-lo em nossos corações da forma certa, e também te falar algumas coisas...

Existem dias que eu olho para você e nem acredito que tudo isso seja real. Além de ser a mulher mais linda desse mundo, é a estrela que ilumina o meu céu, carregando todo o brilho e energia que existe, tornando cada passo disso tudo mais fácil. É um sentimento que permeia em mim, que não é tão fácil de explicar e que também não era fácil de entender, até ver que:

Quando consigo realizar algo, é sempre o seu olhar que eu procuro — e quando o encontro, ele está sempre repleto de todos os sentimentos que eu buscava, me deixando o mais próximo do que acho que deve ser o paraíso. E quando faço uma graça, é o seu sorriso lindo que procuro, a sua risada que faz valer a pena a vergonha que eu possa estar passando kkk.

A sua forma de se preocupar comigo, sempre reclamando quando eu não tomo cuidado comigo mesmo kkk... enfim. São tantos detalhes que muitas vezes deixamos passar, mas são exatamente as pequenas coisas que você faz que me mostram o porquê eu me apaixonei por você.

Quando eu fecho os olhos, é você quem eu vejo.

Quero que todos os dias você se sinta a mulher mais especial do mundo!

E para concluir, se você permite... eu gostaria de sentir o cheirinho de casa kkk — você deixa? 🥺`;

  /* ---- ESTADO ---- */
  let charIndex   = 0;
  let timerID     = null;
  let musicaAtiva = false;

  /* ---- PARTÍCULAS ---- */
  function spawnHearts() {
    const c       = document.getElementById('particles');
    const symbols = ['♥','❤','♡','✦','✿','·'];
    for (let h = 0; h < 24; h++) {
      const el = document.createElement('div');
      el.className   = 'heart-particle';
      el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
      el.style.left              = Math.random() * 100 + '%';
      el.style.bottom            = '-24px';
      el.style.animationDuration = (5 + Math.random() * 8) + 's';
      el.style.animationDelay    = (Math.random() * 12) + 's';
      el.style.fontSize          = (9 + Math.random() * 11) + 'px';
      c.appendChild(el);
    }
  }

  /* ---- ABRIR CARTA ---- */
  function abrirCarta() {
    document.getElementById('tela-inicio').style.display = 'none';
    const tc = document.getElementById('tela-carta');
    tc.style.display = 'flex';
    setTimeout(() => document.getElementById('title').classList.add('visible'), 300);
    setTimeout(() => document.getElementById('music-bar').classList.add('visible'), 800);
    setTimeout(typeWriter, 1100);
  }

  /* ---- TYPEWRITER ---- */
  function typeWriter() {
    const el     = document.getElementById('carta-text');
    const cursor = document.getElementById('cursor');

    if (charIndex < texto.length) {
      const ch = texto[charIndex];

      // insere o caractere antes do cursor
      const node = document.createTextNode(ch);
      el.insertBefore(node, cursor);
      charIndex++;

      // rolar suavemente
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });

      // delay variável
      let delay = 30 + Math.random() * 25;
      if (ch === '\n')                   delay = 340;
      else if (ch === '.' || ch === '!') delay = 190;
      else if (ch === ',')               delay = 100;
      else if (ch === '—')               delay = 130;
      else if (ch === '.')               delay = 180;

      timerID = setTimeout(typeWriter, delay);
    } else {
      // fim da carta
      cursor.classList.add('hidden');
      setTimeout(() => document.getElementById('assinatura').classList.add('visible'), 600);
      setTimeout(() => document.getElementById('bottom-row').classList.add('visible'), 1500);
    }
  }

  /* ---- REINICIAR ---- */
  function restart() {
    clearTimeout(timerID);
    charIndex = 0;

    const el     = document.getElementById('carta-text');
    const cursor = document.getElementById('cursor');

    // remove todos os nós de texto
    while (el.firstChild && el.firstChild !== cursor) {
      el.removeChild(el.firstChild);
    }

    cursor.classList.remove('hidden');
    document.getElementById('assinatura').classList.remove('visible');
    document.getElementById('bottom-row').classList.remove('visible');
    window.scrollTo({ top: 0, behavior: 'smooth' });
    setTimeout(typeWriter, 500);
  }

  /* ---- MÚSICA ---- */
  function toggleMusic() {
    const audio = document.getElementById('audio');
    const dot   = document.getElementById('music-dot');
    const label = document.getElementById('music-label');

    if (!audio.src || audio.networkState === 3) {
      // arquivo não encontrado
      label.textContent = '♪ Coloque "those-eyes.mp3" na mesma pasta';
      return;
    }

    if (musicaAtiva) {
      audio.pause();
      musicaAtiva = false;
      dot.classList.remove('playing');
      label.textContent = '♪ Until I Found You — toque para ouvir';
    } else {
      audio.play().then(() => {
        musicaAtiva = true;
        dot.classList.add('playing');
        label.textContent = '♪ Until I Found You — tocando ♬';
      }).catch(() => {
        label.textContent = '♪ Coloque "until-i-found-you.mp3" na mesma pasta';
      });
    }
  }

  /* ---- INIT ---- */
  spawnHearts();
</script>
</body>
</html>
